name: Github Action 테스트 1번

on:
  push:
    branches:
      - main

jobs:
  My-Deploy-Job:
    runs-on: ubuntu-latest

    steps:
      - name: Hello World 출력
        run: echo "Hello World"

      - name: 여러게 명령어 추가하기
        run: |
          echo "Good"
          echo "Morning"

      - name: 깃허브의 내장변수 사용
        run: | 
          echo $GITHUB_SHA
          echo $GITHUB_REPOSITORY
          echo "3. 워크플로우 실행한 곳 : $GITHUB_ACTOR"
          echo "4. 현제 실행중인 브랜치 : $GITHUB_REF_NAME"
          echo "5. 현제 실행중인 브랜치 : $GITHUB_RUN_NUMBER"
          echo "6. 현제 실행중인 브랜치 : $GITHUB_EVENT_NAME"
          echo "7. 현제 실행중인 브랜치 : $GITHUB_OS"
          echo "8. 현제 실행중인 브랜치 : $GITHUB_WORKSPACE"
