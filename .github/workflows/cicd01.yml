name: Github Action 테스트 1번

on:
  push:
    branches:
      - main

jobs:
  My-Deploy-Job:
    runs-on: ubuntu-latest

    steps:
      - name: Hello World 출력
        run: echo "Hello World"

      - name: 여러게 명령어 추가하기
        run: |
          echo "Good"
          echo "Morning"

      - name: 깃허브의 내장변수 사용
        run: | 
          echo $GITHUB_SHA
          echo $GITHUB_REPOSITORY